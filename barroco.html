<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>historia de la música--barroco</title>

    <script type="module">
        import '@knight-lab/timelinejs/dist/css/timeline.css';
        import { Timeline } from '@knight-lab/timelinejs';
        // The Timeline constructor takes at least two arguments:
        // the id of the Timeline container (no '#'), and
        // the URL to your JSON data file or Google spreadsheet.
        // the id must refer to an element "above" this code,
        // and the element must have CSS styling to give it width and height
        // optionally, a third argument with configuration options can be passed.
        const options = {
            hash_bookmarks: true,
            debug: true,
        }
        const elementId = 'timeline-embed';
        const spreadSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBisX-WepBON6ZzOFWCz1lV9l345f7Ywa_9D7tYJqp1sRiEfLDljp2tS94F2os6-j2OZjcxd8OL0P_/pubhtml';
        const timeline = new Timeline(elementId, spreadSheetUrl, options);
        console.log('%c  timeline:', 'color: #0e93e0;background: #aaefe5;', timeline);


        timeline.on('zoom_in', (data) => {
            console.log('%c  data:', 'color: #0e93e0;background: #aaefe5;', data);

        })

        timeline.on('zoom_out', (data) => {
            console.log('%c  data:', 'color: #0e93e0;background: #aaefe5;', data);

        })
    </script>
</head>

<body>
    <div id='timeline-embed' style="width: 100%; height: 600px"></div>

</body>

</html>
